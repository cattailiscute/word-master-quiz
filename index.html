<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영단어 마스터</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section id="login-screen">
            <h1>🦉 영단어 퀴즈</h1>
            <input type="text" id="userNameInput" placeholder="이름을 입력하세요" autofocus>
            <button onclick="saveUser()" class="main-btn">시작하기</button>
        </section>

        <section id="menu-screen" style="display: none;">
            <h2 id="welcome-msg"></h2>
            <p>Day를 선택하세요:</p>
            <div id="day-grid" class="day-grid"></div>
        </section>

        <section id="game-screen" style="display: none;">
            <div class="game-header">
                <span id="timer">시간: 2:00</span>
                <span id="game-progress">0 / 10</span>
            </div>

            <div id="quiz-area">
                <div class="question-box">
                    <h2 id="question-word">Word</h2>
                    <p id="hint-text" style="color: #aaa; min-height: 1.2em;"></p>
                </div>
                <div id="choice-container" class="choice-grid"></div>
                <div id="input-container" style="display: none;">
                    <input type="text" id="answerInput" placeholder="정답을 입력하세요">
                    <button id="submit-btn" class="submit-btn">확인 (Enter)</button>
                </div>
            </div>

            <div id="matching-area" style="display: none;">
                <h3 id="matching-title">보너스 매칭</h3>
                <div id="card-grid" class="card-grid"></div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
